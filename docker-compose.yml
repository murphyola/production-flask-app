services:
  flask:
    build: .
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - app-network

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
